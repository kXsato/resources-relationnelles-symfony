services:
    php:
        build: .docker/php
        volumes:
            - .:/var/www/html
        networks:
            - app

    db:
        image: mariadb:latest
        environment:
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
            MARIADB_DATABASE: ${DB_NAME:-app}
            MARIADB_USER: ${DB_USER:-app}
            MARIADB_PASSWORD: ${DB_PASSWORD:-app}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - app

    caddy:
        image: caddy:alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - .:/var/www/html
            - ./.docker/caddy/etc/caddy/Caddyfile:/etc/caddy/Caddyfile
            - ./.docker/caddy/certs:/etc/caddy/certs
            - caddy_data:/data
            - caddy_config:/config
        networks:
            - app
        depends_on:
            - php

volumes:
    db_data:
    caddy_data:
    caddy_config:

networks:
    app:
