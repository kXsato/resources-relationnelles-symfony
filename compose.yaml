services:
  php:
    build: .docker/php
    volumes:
      - .:/var/www/html:delegated
    networks:
      - app

  db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-app}
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:delegated
      - ./.docker/caddy/etc/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./.docker/caddy/certs:/etc/caddy/certs
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app
    depends_on:
      - php

  message-queue:
    build: .docker/php
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=128M -vv
    volumes:
      - .:/var/www/html
    networks:
      - app
    depends_on:
      - db
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - app

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  app:
