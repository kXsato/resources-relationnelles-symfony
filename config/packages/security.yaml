security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        user_registration:
            pattern: ^/api/users$
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_resource_list
            logout:
                path: app_logout

    access_control:
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/users$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/resources, roles: PUBLIC_ACCESS }
        - { path: ^/api/quiz/questions, roles: PUBLIC_ACCESS }
        - { path: ^/api/comments, roles: PUBLIC_ACCESS }
        - { path: ^/api/favorites, roles: PUBLIC_ACCESS }
        - { path: ^/api/quiz/answer, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/progress, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/quiz, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/favorites, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/super-admin, roles: ROLE_SUPER_ADMIN }
        - { path: ^/moderator, roles: ROLE_MODERATOR }
        - { path: ^/compte-desactive, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/mon-compte, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10