      description: "Comprendre l'empathie et son rôle central dans la construction de relations durables."
      status: "draft"
      author: "bob"
      categories: [empathie, lien_social]
      content: |
          L'empathie ne se résume pas à ressentir ce que l'autre ressent.
          C'est aussi la capacité à reconnaître et valider les émotions d'autrui sans les minimiser.
          Cet article explore les différentes formes d'empathie et comment les développer.

    - title: "La nature comme espace de ressourcement"
