    - title: "Introduction à la communication non-violente"
      slug: "introduction-communication-non-violente"
      description: "Découvrez les bases de la communication non-violente pour améliorer vos relations au quotidien."
      status: "published"
      author: "alice"
      categories: [communication, bien_etre]
      content: |
          La communication non-violente (CNV) est une approche développée par Marshall Rosenberg.
          Elle repose sur quatre composantes : l'observation, le sentiment, le besoin et la demande.
          En pratiquant la CNV, on apprend à exprimer ses émotions sans jugement ni reproche.

